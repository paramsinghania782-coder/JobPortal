<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Posted! | JobHub</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); /* Greenish Theme */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .success-card {
            background: white;
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Checkmark Animation */
        .check-container {
            width: 100px; height: 100px;
            margin: 0 auto 30px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .check-icon {
            font-size: 50px; color: #22c55e;
            opacity: 0;
            animation: checkAppear 0.5s 0.3s forwards;
        }

        @keyframes checkAppear {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }

        .btn-dashboard {
            background: #0f172a; color: white; padding: 12px 30px; border-radius: 50px;
            text-decoration: none; font-weight: 600; transition: 0.3s;
        }
        .btn-dashboard:hover { background: #3b82f6; transform: translateY(-3px); color: white; }

        .btn-outline {
            border: 2px solid #e2e8f0; color: #64748b; padding: 10px 25px; border-radius: 50px;
            text-decoration: none; font-weight: 600; transition: 0.3s; margin-left: 10px;
        }
        .btn-outline:hover { border-color: #0f172a; color: #0f172a; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-container">
            <i class="fas fa-check check-icon"></i>
        </div>
        
        <h2 class="fw-bold text-dark mb-2">Job Posted Successfully!</h2>
        <p class="text-muted mb-4 fs-6">
            Your job opening is now live. Candidates can start applying immediately.
        </p>

        <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'recruiter_dashboard' %}" class="btn-dashboard">Go to Dashboard</a>
            <a href="{% url 'post_job' %}" class="btn-outline">Post Another Job</a>
        </div>
    </div>

</body>
</html>
