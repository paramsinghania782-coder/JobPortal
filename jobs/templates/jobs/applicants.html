<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow">
        <h3>Applicants for: <span class="text-primary">{{ job.title }}</span></h3>
        <hr>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Applied At</th>
                    <th>Resume</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applicants %}
                <tr>
                    <td>{{ app.full_name }}</td>
                    <td>{{ app.email }}</td>
                    <td>{{ app.applied_at }}</td>
                    <td>
                        <a href="{{ app.resume.url }}" target="_blank" class="btn btn-sm btn-outline-primary">
                            Download Resume 📄
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4">No applications yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{% url 'recruiter_dashboard' %}" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
