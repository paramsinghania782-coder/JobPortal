<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up | JobHub Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .signup-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control, .form-select {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 15px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-signup {
            background: linear-gradient(to right, #2563eb, #3b82f6);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-signup:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }

        label { font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; display: block; }
        
        .helptext { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: -10px; margin-bottom: 10px; }
        ul.errorlist { color: #ef4444; font-size: 0.85rem; padding-left: 20px; }
    </style>
</head>
<body>
    <a href="/" class="btn btn-outline-light position-absolute top-0 start-0 m-4 px-3 py-2" style="z-index: 100; border-radius: 12px; backdrop-filter: blur(5px); background: rgba(255, 255, 255, 0.05);">
        <i class="fas fa-home me-2"></i> Home
    </a>    
    
    <div class="signup-card">
        <h2 class="text-center fw-bold mb-1">Create Account</h2>
        <p class="text-center text-muted mb-4 small">Join thousands of professionals today.</p>

        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-2">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small class="text-muted d-block mt-1" style="font-size: 0.75rem">{{ field.help_text }}</small>
                    {% endif %}
                    {% for error in field.errors %}
                        <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-signup mt-3">
                Sign Up <i class="fas fa-user-plus ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-4 border-top pt-3">
            <small class="text-muted">Already have an account? <a href="{% url 'login' %}" class="fw-bold text-primary text-decoration-none">Login Here</a></small>
        </div>
    </div>

</body>
</html>
