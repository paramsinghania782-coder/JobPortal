<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | JobHub Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
            text-align: center;
        }

        .role-switch {
            background: #f1f5f9;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            margin-bottom: 25px;
            position: relative;
        }

        .role-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            color: #64748b;
            z-index: 2;
        }

        .role-option.active {
            color: white;
            background: #3b82f6;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .form-control {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 15px;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: none;
            background: white;
        }

        .btn-login {
            background: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }
        .btn-login:hover {
            background: #3b82f6;
            transform: translateY(-2px);
        }

        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }
    </style>
</head>
<body>
    <a href="/" class="btn btn-outline-light position-absolute top-0 start-0 m-4 px-3 py-2" style="z-index: 100; border-radius: 12px; backdrop-filter: blur(5px); background: rgba(255, 255, 255, 0.05);">
        <i class="fas fa-home me-2"></i> Home
    </a>

    <div class="decoration-circle" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
    <div class="decoration-circle" style="width: 200px; height: 200px; bottom: 50px; right: -50px;"></div>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fas fa-briefcase text-primary"></i> Job<span class="text-primary">Hub</span>
        </div>
        <p class="text-center text-muted mb-4">Welcome back! Please login to continue.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} p-2 small text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}
            
            <input type="hidden" name="login_role" id="selected_role" value="candidate">

            <div class="role-switch">
                <div class="role-option active" id="btn-candidate" onclick="selectRole('candidate')">
                    <i class="fas fa-user-graduate me-1"></i> Candidate
                </div>
                <div class="role-option" id="btn-recruiter" onclick="selectRole('recruiter')">
                    <i class="fas fa-tie me-1"></i> Recruiter
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">USERNAME</label>
                <div class="input-group">
                    <span class="input-group-text border-0 bg-transparent ps-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="off">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">PASSWORD</label>
                <div class="input-group">
                    <span class="input-group-text border-0 bg-transparent ps-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <div class="mb-4 d-flex justify-content-between">
    <div class="form-check">
        <input type="checkbox" class="form-check-input" id="remember">
        <label class="form-check-label small text-muted" for="remember">Remember me</label>
    </div>
    <a href="{% url 'forgot_password' %}" class="small text-primary text-decoration-none fw-bold">Forgot Password?</a>
</div>

            <button type="submit" class="btn btn-login shadow-sm">
                Login securely <i class="fas fa-arrow-right ms-2"></i>
            </button>

            <div class="text-center mt-4">
                <small class="text-muted">Don't have an account? <a href="{% url 'signup' %}" class="fw-bold text-primary text-decoration-none">Create Account</a></small>
            </div>
        </form>
    </div>

    <script>
        function selectRole(role) {
            // Update Hidden Input
            document.getElementById('selected_role').value = role;

            // Visual Updates
            if(role === 'candidate') {
                document.getElementById('btn-candidate').classList.add('active');
                document.getElementById('btn-recruiter').classList.remove('active');
            } else {
                document.getElementById('btn-recruiter').classList.add('active');
                document.getElementById('btn-candidate').classList.remove('active');
            }
        }
    </script>

</body>
</html>
