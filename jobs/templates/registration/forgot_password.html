<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password | JobHub Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #1e293b;
        }
        
        /* Glassmorphism Card */
        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-control {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: none;
            background: white;
        }

        .question-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn-reset {
            background: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
            border: none;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }
    </style>
</head>
<body>
    <a href="/" class="btn btn-outline-light position-absolute top-0 start-0 m-4 px-3 py-2" style="z-index: 100; border-radius: 12px; backdrop-filter: blur(5px); background: rgba(255, 255, 255, 0.05);">
        <i class="fas fa-home me-2"></i> Home
    </a>
    
    <div class="decoration-circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="decoration-circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <div class="reset-card">
        <div class="brand-logo">
            <i class="fas fa-shield-alt text-primary"></i> Job<span class="text-primary">Hub</span>
        </div>
        <p class="text-center text-muted mb-4 small">Verify your identity to recover account</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} p-2 small text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" id="resetForm" autocomplete="off">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">USERNAME</label>
                <div class="input-group">
                    <span class="input-group-text border-0 bg-transparent ps-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" name="username" id="usernameField" class="form-control" placeholder="Enter your username" required>
                </div>
                
                <button type="button" id="searchUserBtn" class="btn btn-outline-primary w-100 mt-2" style="border-radius: 12px; font-weight: 500;">
                    <i class="fas fa-search"></i> Search User
                </button>

                <div id="userError" class="text-danger mt-1" style="display:none; font-size: 0.75rem;">
                    <i class="fas fa-exclamation-circle"></i> User not found
                </div>
            </div>

            <div id="questionSection" style="display:none;">
                <div class="question-box">
                    <label class="small fw-bold text-primary mb-1">Your Security Question:</label>
                    <p id="displayQuestion" class="mb-0 fw-600" style="font-size: 0.9rem;"></p>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">SECURITY ANSWER</label>
                    <input type="text" name="security_answer" class="form-control" placeholder="Type your answer here" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">NEW PASSWORD</label>
                    <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-reset shadow-sm">
                    Reset Password <i class="fas fa-check-circle ms-2"></i>
                </button>
            </div>
            
            <div id="loader" class="text-center py-2" style="display:none;">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
            </div>

            <div class="text-center mt-4 pt-3 border-top">
                <a href="{% url 'login' %}" class="fw-bold text-primary text-decoration-none small">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>

<script>
        function fetchUserDetails() {
            const username = document.getElementById('usernameField').value;
            const qSection = document.getElementById('questionSection');
            const loader = document.getElementById('loader');
            const userError = document.getElementById('userError');

            if (username.length > 2) {
                loader.style.display = 'block';
                userError.style.display = 'none';

                fetch(`/get-security-question/?username=${username}`)
                    .then(response => {
                        if (!response.ok) throw new Error('Not found');
                        return response.json();
                    })
                    .then(data => {
                        loader.style.display = 'none';
                        if (data.question) {
                            document.getElementById('displayQuestion').innerText = data.question;
                            qSection.style.display = 'block';
                            
                            document.getElementById('searchUserBtn').style.display = 'none';
                        }
                    })
                    .catch(error => {
                        loader.style.display = 'none';
                        qSection.style.display = 'none';
                        userError.style.display = 'block';
                    });
            }
        }

        document.getElementById('searchUserBtn').addEventListener('click', fetchUserDetails);

        document.getElementById('usernameField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                fetchUserDetails();
            }
        });
    </script>
